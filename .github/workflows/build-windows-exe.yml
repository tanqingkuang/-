name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "requirements-gui.txt"
      - "scripts/build_windows_*.ps1"
      - "scripts/pyinstaller_hooks/**"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows-x64:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: full
            script: ./scripts/build_windows_full_release.ps1
            artifact: formation-sim-windows-x64-full
            artifact_paths: |
              dist/编队仿真.exe
              dist/*.glb
          - profile: lite
            script: ./scripts/build_windows_lite_release.ps1
            artifact: formation-sim-windows-x64-lite
            artifact_paths: dist/编队仿真-裁剪版.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Build ${{ matrix.profile }} exe
        shell: pwsh
        run: ${{ matrix.script }}

      - name: Upload ${{ matrix.profile }} exe
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_paths }}
