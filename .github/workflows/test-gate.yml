name: 测试门禁

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: 静态检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 安装静态检查工具
        run: |
          python -m pip install --upgrade pip
          # mypy 需要依赖的类型信息，装上运行依赖减少 ignore_missing_imports 盲区。
          python -m pip install ".[lint]"

      - name: 运行 ruff
        run: python -m ruff check src tests scripts

      - name: 运行 mypy
        # 宽松基线配置见 pyproject.toml [tool.mypy]，收紧计划以注释形式写在配置旁。
        run: python -m mypy

  llt-st:
    name: LLT 与 ST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 安装 Qt 运行库
        run: |
          # Ubuntu 上 PySide6 offscreen 仍需动态库，否则 Qt plugin 可能加载失败。
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libfontconfig1 \
            libx11-xcb1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libglib2.0-0 \
            libice6 \
            libsm6 \
            libxi6 \
            libxrender1 \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: 运行 LLT（含覆盖率）
        # 覆盖率只统计 LLT；ST 是黑盒验收，刻意不计入（见 pyproject.toml [tool.coverage]）。
        # 2026-07 基线 91.9%，阈值取 90 防倒退；阈值只写在 CI 命令行，
        # 避免本地跑单个测试文件时被 fail-under 误伤。
        env:
          # sys.monitoring 覆盖率内核(Python 3.12+/coverage 7.4+):行覆盖场景下
          # 插桩开销从约 +56% 降到约 +3%,覆盖率数值与默认内核一致。
          COVERAGE_CORE: sysmon
        run: pytest tests/llt -q --cov --cov-report=term --cov-report=xml --cov-fail-under=90

      - name: 覆盖率写入 Job Summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            python -c "import xml.etree.ElementTree as ET; r = ET.parse('coverage.xml').getroot(); print(f'### LLT 行覆盖率：{float(r.get(\"line-rate\", 0)) * 100:.1f}%')" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 运行 ST
        run: |
          # 同时校验退出码与输出，避免 ST 静默退化。
          set -o pipefail
          python scripts/run_st.py | tee st-output.txt
          grep -Fx "ST OK" st-output.txt
