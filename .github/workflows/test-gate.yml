name: 测试门禁

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  llt-st:
    name: LLT 与 ST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-gui.txt

      - name: 安装 Qt 运行库
        run: |
          # Ubuntu 上 PySide6 offscreen 仍需动态库，否则 Qt plugin 可能加载失败。
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libfontconfig1 \
            libx11-xcb1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libglib2.0-0 \
            libice6 \
            libsm6 \
            libxi6 \
            libxrender1 \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-gui.txt pytest numpy

      - name: 运行 LLT
        run: pytest tests/llt -q

      - name: 运行 ST
        run: |
          # 同时校验退出码与输出，避免 ST 静默退化。
          set -o pipefail
          python scripts/run_st.py | tee st-output.txt
          grep -Fx "ST OK" st-output.txt
